<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ניר הנדסה — מעקב מסמכים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8fafc;--s1:#fff;--s2:#f1f5f9;--s3:#e2e8f0;
  --br:#e2e8f0;--br2:#cbd5e1;
  --acc:#2563eb;--acc2:#4f46e5;
  --red:#ef4444;--ora:#f97316;--grn:#10b981;--gry:#94a3b8;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
  --r:12px;--r2:8px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t1);direction:rtl;display:flex;flex-direction:column}

/* OVERLAY */
#ov{position:fixed;inset:0;z-index:300;background:rgba(15,23,42,.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px}
.ob{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--sh2)}
.ob h2{font-size:1.4rem;font-weight:800;margin-bottom:6px}
.ob p{color:var(--t2);font-size:.88rem;margin-bottom:24px}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:.7rem;font-weight:700;color:var(--t3);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase}
.fl input{width:100%;padding:11px 13px;background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r2);color:var(--t1);font-size:.9rem;direction:ltr;font-family:monospace;transition:border-color .2s}
.fl input:focus{outline:none;border-color:var(--acc);background:#fff}
.bp{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:var(--r2);font-size:1rem;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;margin-top:4px}
.bp:hover{filter:brightness(1.07)}
#serr{color:var(--red);font-size:.82rem;margin-top:12px;display:none;text-align:center;padding:8px;background:#fef2f2;border-radius:6px}

/* TOPBAR */
#top{background:#fff;border-bottom:1px solid var(--br);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:var(--sh);flex-wrap:wrap;}
#logo-wrap{height:36px;display:flex;align-items:center;flex-shrink:0}
#logo-img{height:36px;width:auto;object-fit:contain;display:none}
#logo-fb{width:36px;height:36px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff}
.tt{font-size:.92rem;font-weight:800;flex:1;min-width:0}
.ts{font-size:.68rem;color:var(--t3)}
.tbtn{height:30px;padding:0 10px;border-radius:6px;background:var(--s2);border:1px solid var(--br);color:var(--t2);cursor:pointer;font-size:.75rem;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}
.tbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:250px;min-width:250px;background:#fff;border-left:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;transition:width .25s,min-width .25s;box-shadow:2px 0 6px rgba(0,0,0,.04)}
#sidebar.off{width:0;min-width:0;border:none;box-shadow:none}
.sbh{padding:12px 12px 8px;border-bottom:1px solid var(--br);flex-shrink:0}
.sbht{font-size:.7rem;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sbsi{position:relative}
.sbsi input{width:100%;padding:7px 9px 7px 28px;background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r2);color:var(--t1);font-size:.8rem;font-family:'Heebo',sans-serif;transition:border-color .2s}
.sbsi input:focus{outline:none;border-color:var(--acc);background:#fff}
.sbsi span{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.sbact{padding:6px 12px;display:flex;gap:5px;border-bottom:1px solid var(--br);flex-shrink:0}
.sbbtn{flex:1;padding:5px 4px;border-radius:5px;border:1px solid var(--br);background:var(--s2);color:var(--t2);font-size:.68rem;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;white-space:nowrap}
.sbbtn:hover{border-color:var(--acc);color:var(--acc);background:#eff6ff}
#clist{flex:1;overflow-y:auto;padding:5px}
#clist::-webkit-scrollbar{width:3px}
#clist::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.ci{padding:6px 9px;border-radius:var(--r2);cursor:pointer;display:flex;align-items:center;gap:7px;margin-bottom:2px;border:1.5px solid transparent;transition:all .12s}
.ci:hover{background:var(--s2)}
.ci.sel{background:#eff6ff;border-color:#bfdbfe}
.cicb{width:15px;height:15px;border:1.5px solid var(--br2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:#fff;transition:all .12s}
.ci.sel .cicb{background:var(--acc);border-color:var(--acc);color:#fff}
.cin{font-size:.78rem;flex:1;line-height:1.3;color:var(--t2)}
.ci.sel .cin{color:var(--acc);font-weight:600}
.cib{font-size:.64rem;padding:1px 5px;border-radius:8px;background:var(--s2);color:var(--t3);border:1px solid var(--br);flex-shrink:0}
.ci.sr .cib{background:#fef2f2;color:var(--red);border-color:#fecaca}
.ci.so .cib{background:#fff7ed;color:var(--ora);border-color:#fed7aa}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* FILTER BAR */
#fbar{background:#fff;border-bottom:1px solid var(--br);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;flex-shrink:0;box-shadow:var(--sh)}

/* MULTI-SELECT DROPDOWN FILTER */
.mf{position:relative;flex:1;min-width:150px}
.mf-btn{width:100%;padding:8px 30px 8px 10px;background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r2);color:var(--t2);font-size:.8rem;font-family:'Heebo',sans-serif;text-align:right;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;position:relative;white-space:nowrap;overflow:hidden}
.mf-btn:hover,.mf.open .mf-btn{border-color:var(--acc);background:#fff;color:var(--t1)}
.mf-arrow{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:11px;transition:transform .2s;pointer-events:none}
.mf.open .mf-arrow{transform:translateY(-50%) rotate(180deg)}
.mf-badge{background:var(--acc);color:#fff;border-radius:10px;padding:1px 7px;font-size:.68rem;font-weight:700;flex-shrink:0}
.mf-panel{position:absolute;top:calc(100% + 4px);right:0;min-width:100%;background:#fff;border:1.5px solid var(--acc);border-radius:var(--r2);box-shadow:var(--sh2);z-index:200;display:none;max-width:340px}
.mf.open .mf-panel{display:block}
.mf-search{padding:8px 10px;border-bottom:1px solid var(--br)}
.mf-search input{width:100%;padding:6px 9px;background:var(--s2);border:1.5px solid var(--br);border-radius:6px;color:var(--t1);font-size:.8rem;font-family:'Heebo',sans-serif;direction:rtl}
.mf-search input:focus{outline:none;border-color:var(--acc)}
.mf-acts{padding:5px 10px;display:flex;gap:6px;border-bottom:1px solid var(--br)}
.mf-act{font-size:.7rem;color:var(--acc);cursor:pointer;background:none;border:none;font-family:'Heebo',sans-serif;padding:2px 0}
.mf-act:hover{text-decoration:underline}
.mf-list{max-height:200px;overflow-y:auto;padding:4px}
.mf-list::-webkit-scrollbar{width:3px}
.mf-list::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.mf-item{padding:7px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;font-size:.8rem;color:var(--t1)}
.mf-item:hover{background:var(--s2)}
.mf-item.sel{background:#eff6ff}
.mf-item .cb{width:14px;height:14px;border:1.5px solid var(--br2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:#fff}
.mf-item.sel .cb{background:var(--acc);border-color:var(--acc);color:#fff}
.mf-item mark{background:transparent;color:var(--acc);font-weight:700}
.mf-empty{padding:16px;text-align:center;color:var(--t3);font-size:.78rem}
.mf-count{padding:6px 10px;border-top:1px solid var(--br);font-size:.7rem;color:var(--t3);text-align:center}

/* SEARCH BOX */
.sb-wrap{position:relative;flex:1;min-width:180px}
#fsearch{width:100%;padding:8px 10px 8px 30px;background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r2);color:var(--t1);font-size:.8rem;font-family:'Heebo',sans-serif;direction:rtl;transition:border-color .2s}
#fsearch:focus{outline:none;border-color:var(--acc);background:#fff}
.sbi{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}

/* STATUS FILTERS */
#sfs{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.sf{padding:6px 10px;border-radius:20px;border:1.5px solid var(--br);background:var(--s2);color:var(--t2);font-size:.72rem;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;white-space:nowrap}
.sf.ar{background:#fef2f2;border-color:var(--red);color:var(--red)}
.sf.ao{background:#fff7ed;border-color:var(--ora);color:var(--ora)}
.sf.ag{background:#f0fdf4;border-color:var(--grn);color:var(--grn)}
.sf.an{background:var(--s3);border-color:var(--gry);color:var(--gry)}
#fclr{padding:6px 10px;border-radius:var(--r2);border:1px solid var(--br);background:transparent;color:var(--t3);font-size:.72rem;cursor:pointer;font-family:'Heebo',sans-serif;white-space:nowrap}
#fclr:hover{color:var(--red);border-color:var(--red)}

/* STAT CARDS */
#stats{display:flex;gap:8px;padding:10px 14px;flex-shrink:0;overflow-x:auto}
#stats::-webkit-scrollbar{display:none}
.sc{background:#fff;border:1.5px solid var(--br);border-radius:var(--r);padding:9px 14px;display:flex;align-items:center;cursor:pointer;transition:all .18s;flex-shrink:0;min-width:100px;border-bottom:3px solid transparent;box-shadow:var(--sh)}
.sc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.sc.act{transform:translateY(-2px);box-shadow:var(--sh2)}
.sc-t{border-bottom-color:var(--acc)}.sc-t.act{background:#eff6ff}
.sc-r{border-bottom-color:var(--red)}.sc-r.act{background:#fef2f2}
.sc-o{border-bottom-color:var(--ora)}.sc-o.act{background:#fff7ed}
.sc-g{border-bottom-color:var(--grn)}.sc-g.act{background:#f0fdf4}
.sc-n2{border-bottom-color:var(--gry)}.sc-n2.act{background:var(--s2)}
.scn{font-size:1.4rem;font-weight:900;line-height:1}
.scl{font-size:.62rem;color:var(--t2);margin-top:3px;font-weight:500}
.sc-t .scn{color:var(--acc)}.sc-r .scn{color:var(--red)}.sc-o .scn{color:var(--ora)}.sc-g .scn{color:var(--grn)}.sc-n2 .scn{color:var(--gry)}

/* RCOUNT */
#rcount{padding:5px 14px;font-size:.7rem;color:var(--t3);border-bottom:1px solid var(--br);flex-shrink:0;background:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rc-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;background:var(--s2);border:1px solid var(--br);font-size:.68rem;color:var(--t2)}
.rc-tag button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;padding:0 0 0 2px;line-height:1}
.rc-tag button:hover{color:var(--red)}

/* TABLE */
#tarea{flex:1;overflow:hidden;display:flex;flex-direction:column}
#tscroll{flex:1;overflow:auto}
#tscroll::-webkit-scrollbar{width:5px;height:5px}
#tscroll::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:680px}
thead th{background:#fff;padding:9px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);white-space:nowrap;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;transition:color .15s}
thead th:hover{color:var(--t1)}
th .sa{opacity:.3;font-size:.58rem;margin-right:2px}
th.sorted .sa{opacity:1;color:var(--acc)}
td{padding:8px 12px;border-bottom:1px solid var(--br);vertical-align:middle}
tr:hover td{background:#f8fafc}
.tdc{font-weight:700;font-size:.8rem}
.tdl{color:var(--t2);font-size:.75rem;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tdt{font-size:.78rem;max-width:180px}
.tdd{color:var(--t2);font-size:.75rem;white-space:nowrap}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap}
.pr{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.po{background:#fff7ed;color:var(--ora);border:1px solid #fed7aa}
.pg{background:#f0fdf4;color:var(--grn);border:1px solid #bbf7d0}
.pn{background:var(--s2);color:var(--t3);border:1px solid var(--br)}
.lbtn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:6px;background:#eff6ff;border:1px solid #bfdbfe;color:var(--acc);font-size:.7rem;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;text-decoration:none}
.lbtn:hover{background:#dbeafe}

/* CARDS */
#cv{display:none;flex:1;overflow-y:auto;padding:10px 14px 60px;flex-direction:column}
#cv::-webkit-scrollbar{width:4px}
#cv::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.card{background:#fff;border:1.5px solid var(--br);border-radius:var(--r);padding:13px 14px;margin-bottom:9px;box-shadow:var(--sh)}
.card.cr{border-right:4px solid var(--red);border-color:#fecaca}
.card.co{border-right:4px solid var(--ora);border-color:#fed7aa}
.card.cg{border-right:4px solid var(--grn);border-color:#bbf7d0}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.ctype{font-weight:700;font-size:.86rem;line-height:1.3}
.cmeta{color:var(--t2);font-size:.74rem;margin-bottom:8px;line-height:1.5}
.cdates{display:flex;gap:16px;margin-bottom:9px;padding:7px 10px;background:var(--s2);border-radius:var(--r2)}
.cdl{font-size:.62rem;color:var(--t3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.cdv{font-size:.82rem;font-weight:600}
.cfoot{display:flex;justify-content:space-between;align-items:center;gap:6px}
.cfn{font-size:.68rem;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:9px 18px;border-radius:9px;font-size:.82rem;font-family:'Heebo',sans-serif;z-index:999;transition:transform .28s;box-shadow:var(--sh2);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.ei{font-size:2.5rem;margin-bottom:10px;opacity:.3}
.et{font-size:.9rem;font-weight:600;color:var(--t2);margin-bottom:4px}

#loading{display:none;position:fixed;inset:0;background:rgba(248,250,252,.85);z-index:150;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spin{width:30px;height:30px;border:3px solid var(--br);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:680px){
  #sidebar{position:fixed;inset:0 0 0 auto;z-index:100;width:270px!important;min-width:270px!important;box-shadow:var(--sh2)}
  #sidebar.off{width:0!important;min-width:0!important;box-shadow:none}
  #stats .scl{display:none}
  .scn{font-size:1.2rem}
  .sc{min-width:52px;padding:8px 10px}
  #tarea{display:none}
  #cv{display:flex}
}

@media(max-width:600px){
  #top{padding:6px 10px;gap:5px;}
  #logo-wrap img{height:34px;}
  #logo-wrap{order:0;width:100%;}
  #top .ts{display:none;}
  .tbtn{height:26px;padding:0 7px;font-size:.68rem;}
  #scan-btn{padding:4px 8px;font-size:.68rem;}
}
</style>
</head>
<body>

<div id="ov">
  <div class="ob">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:2.5rem;margin-bottom:8px">🏗</div>
      <h2 style="font-size:1.5rem;font-weight:900;margin-bottom:4px">ניר הנדסה</h2>
      <p style="color:var(--t3);font-size:.85rem">מערכת מעקב מסמכים הנדסיים</p>
    </div>
    <div class="fl">
      <label>קוד כניסה</label>
      <input id="inp-pass" type="password" placeholder="הכנס קוד..." dir="ltr"
        onkeydown="if(event.key==='Enter')doLogin()"
        style="text-align:center;font-size:1.2rem;letter-spacing:.2em">
    </div>
    <button class="bp" onclick="doLogin()">כניסה למערכת</button>
    <div id="serr">⚠️ קוד שגוי — נסה שוב</div>
  </div>
</div>

        <button class="sf" id="sf-r" onclick="togSF('r')">🔴 פג</button>
        <button class="sf" id="sf-o" onclick="togSF('o')">🟡 פוקע</button>
        <button class="sf" id="sf-g" onclick="togSF('g')">🟢 תקין</button>
        <button class="sf" id="sf-n" onclick="togSF('n')">⚪ ללא</button>
      </div>
      <button id="fclr" onclick="clrAll()" style="padding:7px 14px;border-radius:var(--r2);border:1.5px solid #fca5a5;background:#fef2f2;color:var(--red);font-size:.75rem;cursor:pointer;font-family:Heebo,sans-serif;white-space:nowrap;font-weight:600;transition:all .15s">✕ נקה הכל</button>
    </div>

    <div id="stats">
      <div class="sc sc-t" id="sc-all" onclick="clickStat('all')"><div><div class="scn" id="sn-all">—</div><div class="scl">סה"כ</div></div></div>
      <div class="sc sc-r" id="sc-r"   onclick="clickStat('r')"  ><div><div class="scn" id="sn-r">—</div>  <div class="scl">פג תוקף 🔴</div></div></div>
      <div class="sc sc-o" id="sc-o"   onclick="clickStat('o')"  ><div><div class="scn" id="sn-o">—</div>  <div class="scl">פוקע 90י' 🟡</div></div></div>
      <div class="sc sc-g" id="sc-g"   onclick="clickStat('g')"  ><div><div class="scn" id="sn-g">—</div>  <div class="scl">תקין 🟢</div></div></div>
      <div class="sc sc-n2" id="sc-n"  onclick="clickStat('n')"  ><div><div class="scn" id="sn-n">—</div>  <div class="scl">ללא תאריך</div></div></div>
    </div>

    <div id="rcount"></div>

    <div id="tarea">
      <div id="tscroll">
        <table>
          <thead><tr>
            <th onclick="srt('client')"   id="th-client">  <span class="sa">▲</span>שם לקוח</th>
            <th onclick="srt('location')" id="th-location"><span class="sa">▲</span>מיקום</th>
            <th onclick="srt('docType')"  id="th-docType"> <span class="sa">▲</span>סוג מסמך</th>
            <th onclick="srt('docDate')"  id="th-docDate"> <span class="sa">▲</span>תאריך מסמך</th>
            <th onclick="srt('expiry')"   id="th-expiry">  <span class="sa">▲</span>תוקף</th>
            <th>סטטוס</th><th>פתיחה</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div id="cv"></div>
  </div>
</div>

<div id="toast"></div>
<div id="loading" style="display:none"><div class="spin"></div><div style="color:var(--t2);font-size:.85rem">טוען...</div></div>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let ALL=[], F=[];
let selClients=new Set();
// בחירות מרובות לכל פילטר
let mfSel={loc:new Set(), type:new Set(), file:new Set()};
let sfA={r:false,o:false,g:false,n:false};
let sortCol='expiry', sortAsc=true;
let vw='t', sbOpen=window.innerWidth>680;
let ak='',sid='',sn='מסמכים';

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
// ══ פרטי חיבור קבועים ══
const FIXED_SID = "1rOFSo4vz8BoGBydWGgTTMM5xT6Bpm81NLd_1fTTm37Q";
const FIXED_KEY = "AIzaSyDJy8tolZu8z-IuMFXSmRfsFFrM_rJkK8w";
const ACCESS_CODE = "2157"; // ← שנה את הסיסמה כאן

function doLogin(){
  const p = document.getElementById('inp-pass').value.trim();
  if(p === ACCESS_CODE){
    document.getElementById('ov').style.display='none';
    sessionStorage.setItem('auth','1');
    ak = FIXED_KEY; sid = FIXED_SID;
    doLoad(true);
  } else {
    document.getElementById('serr').style.display='block';
    document.getElementById('inp-pass').value='';
    document.getElementById('inp-pass').focus();
  }
}

(()=>{
  if(sessionStorage.getItem('auth')==='1'){
    document.getElementById('ov').style.display='none';
    ak = FIXED_KEY; sid = FIXED_SID;
    doLoad(true);
  }
  if(!sbOpen)document.getElementById('sidebar').classList.add('off');
  // סגור dropdowns בלחיצה מחוץ
  document.addEventListener('mousedown',e=>{
    ['loc','type','file'].forEach(id=>{
      const el=document.getElementById('mf-'+id);
      if(el&&!el.contains(e.target))el.classList.remove('open');
    });
  });
})();

// ══════════════════════════════════════
//  LOAD
// ══════════════════════════════════════
async function doLoad(silent){
  if(!ak||!sid)return;
  document.getElementById('serr').style.display='none';
  if(!silent)document.getElementById('loading').style.display='flex';
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(sn)}?key=${ak}`);
    if(!r.ok)throw new Error();
    const d=await r.json(), rows=d.values||[];
    if(rows.length<2){ALL=[];applyF();return}
    const H=rows[0], ci=n=>H.findIndex(h=>h&&h.includes(n));
    const iA=ci('לקוח'),iB=ci('מיקום'),iC=ci('סוג'),iD=ci('תאריך מסמך'),iE=ci('תוקף'),iF=ci('קישור'),iG=ci('שם קובץ');
    ALL=rows.slice(1).map(r=>({
      client:cl(r[iA]),location:cl(r[iB]),docType:cl(r[iC]),
      docDate:cl(r[iD]),expiry:cl(r[iE]),link:cl(r[iF]),filename:cl(r[iG])
    })).filter(r=>r.client);
    
    document.getElementById('ov').style.display='none';
    applyF();
    updateArchiveCount();
    document.getElementById('tsub').textContent=`${ALL.length} מסמכים · ${new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){document.getElementById('serr').style.display='block'}
  document.getElementById('loading').style.display='none';
}
function cl(s){if(!s)return'';let r=String(s);for(const c of'\u200f\u200e\u202a\u202b\u202c\ufeff\u200b')r=r.split(c).join('');return r.trim()}

// ══════════════════════════════════════
//  DATE / STATUS
// ══════════════════════════════════════
function pd(s){
  if(!s)return null;
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}
function st(e){const d=pd(e);if(!d)return'n';const days=Math.floor((d-new Date().setHours(0,0,0,0))/86400000);return days<0?'r':days<=90?'o':'g'}
function sl(e){
  const d=pd(e);if(!d)return'ללא תאריך';
  const days=Math.floor((d-new Date().setHours(0,0,0,0))/86400000);
  if(days<0)return`פג לפני ${-days}י'`;if(days===0)return'פג היום!';
  if(days<=90)return`עוד ${days} ימים`;return'תקין';
}

// ══════════════════════════════════════
//  CASCADING FILTER ENGINE
//  לכל שלב, הסינון מבוסס על כל השלבים הקודמים בלבד
//  כך שהאפשרויות הזמינות מצטמצמות בהדרגה
// ══════════════════════════════════════
function getSubset(excludeField){
  // מסנן את ALL לפי כל השדות חוץ מ-excludeField
  const q=(document.getElementById('fsearch').value||'').toLowerCase();
  const anyS=Object.values(sfA).some(Boolean);
  return ALL.filter(r=>!isArchived(r.expiry)).filter(r=>{
    if(selClients.size>0&&!selClients.has(r.client))return false;
    if(q&&!matchWords(q,[r.client,r.location,r.docType,r.filename,r.expiry,r.docDate]))return false;
    if(excludeField!=='loc'  && mfSel.loc.size>0  && !mfSel.loc.has(r.location)) return false;
    if(excludeField!=='type' && mfSel.type.size>0 && !mfSel.type.has(r.docType))  return false;
    if(excludeField!=='file' && mfSel.file.size>0 && !mfSel.file.has(r.filename)) return false;
    if(anyS&&!sfA[st(r.expiry)])return false;
    return true;
  });
}

function applyF(){
  F=getSubset(null);
  sortF();
  updateStats();
  renderSB();
  renderTable_or_cards();
  updateRcount();
  updateArchiveCount();
  // רענן אפשרויות בדרופדאונים הפתוחים
  ['loc','type','file'].forEach(id=>{if(document.getElementById('mf-'+id).classList.contains('open'))renderMF(id)});
  updateMFLabels();
}

function updateRcount(){
  const tags=[];
  if(selClients.size) tags.push(`${selClients.size} לקוחות`);
  if(mfSel.loc.size)  tags.push(`${mfSel.loc.size} מיקומים`);
  if(mfSel.type.size) tags.push(`${mfSel.type.size} סוגי מסמך`);
  if(mfSel.file.size) tags.push(`${mfSel.file.size} קבצים`);
  const sfLabels={r:'פג תוקף',o:'פוקע',g:'תקין',n:'ללא תאריך'};
  Object.entries(sfA).forEach(([k,v])=>{if(v)tags.push(sfLabels[k])});

  const rc=document.getElementById('rcount');
  let html=`<span>מציג <strong>${F.length}</strong> מתוך ${ALL.length} מסמכים</span>`;
  tags.forEach(t=>{html+=`<span class="rc-tag">${t}</span>`});
  rc.innerHTML=html;
}

// ══════════════════════════════════════
//  MULTI-SELECT FILTER DROPDOWNS
// ══════════════════════════════════════
const mfField={loc:'location', type:'docType', file:'filename'};

function toggleMF(id){
  const el=document.getElementById('mf-'+id);
  const wasOpen=el.classList.contains('open');
  ['loc','type','file'].forEach(i=>document.getElementById('mf-'+i).classList.remove('open'));
  if(!wasOpen){el.classList.add('open');renderMF(id);document.getElementById('mfs-'+id).focus()}
}

function renderMF(id){
  const field=mfField[id];
  const q=(document.getElementById('mfs-'+id).value||'').toLowerCase();
  // בנה רשימה מהsubset שמוציא את השדה הנוכחי
  const subset=getSubset(id);
  const counts={};
  subset.forEach(r=>{const v=r[field];if(v)counts[v]=(counts[v]||0)+1});

  let vals=Object.keys(counts);
  // חיפוש רב-מילי — כל מילה חייבת להופיע בערך
  if(q){
    const qWords=q.trim().split(/\s+/).filter(Boolean);
    vals=vals.filter(v=>qWords.every(w=>v.toLowerCase().includes(w)));
  }
  vals.sort((a,b)=>a.localeCompare(b,'he'));

  const list=document.getElementById('mfl-list-'+id);
  if(!vals.length){list.innerHTML=`<div class="mf-empty">אין תוצאות</div>`;document.getElementById('mfc-'+id).textContent='';return}

  list.innerHTML=vals.map(v=>{
    const sel=mfSel[id].has(v);
    let hi=E(v);
    if(q){
      const qWords=q.trim().split(/\s+/).filter(Boolean);
      qWords.forEach(w=>{
        const re=new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        hi=hi.replace(re,'<mark>$1</mark>');
      });
    }
    return`<div class="mf-item${sel?' sel':''}" data-id="${id}" data-val="${E(v)}" onmousedown="mfToggleEl(this)">
      <div class="cb">${sel?'✓':''}</div>
      <span style="flex:1">${hi}</span>
      <span style="color:var(--t3);font-size:.68rem">${counts[v]}</span>
    </div>`;
  }).join('');
  document.getElementById('mfc-'+id).textContent=`${vals.length} אפשרויות`;
}

function mfToggle(id,v){
  if(mfSel[id].has(v))mfSel[id].delete(v);else mfSel[id].add(v);
  renderMF(id);
  applyF();
}
function mfSelAll(id){
  const field=mfField[id];
  const q=(document.getElementById('mfs-'+id).value||'').toLowerCase();
  const subset=getSubset(id);
  subset.forEach(r=>{if(r[field]&&(!q||r[field].toLowerCase().includes(q)))mfSel[id].add(r[field])});
  renderMF(id);applyF();
}
function mfClr(id){mfSel[id].clear();renderMF(id);applyF()}

function updateMFLabels(){
  ['loc','type','file'].forEach(id=>{
    const n=mfSel[id].size;
    const lbl={loc:'מיקום',type:'סוג מסמך',file:'שם קובץ'};
    document.getElementById('mfl-'+id).textContent=n>0?`${lbl[id]} (${n})`:lbl[id];
    const badge=document.getElementById('mfb-'+id);
    badge.style.display=n>0?'':'none';
    badge.textContent=n;
  });
}

// ══════════════════════════════════════
//  STATUS FILTERS
// ══════════════════════════════════════
function togSF(s){sfA[s]=!sfA[s];document.getElementById('sf-'+s).className='sf'+(sfA[s]?' a'+s:'');applyF()}
function clickStat(s){
  sfA={r:false,o:false,g:false,n:false};
  if(s!=='all'){sfA[s]=true}
  ['r','o','g','n'].forEach(k=>document.getElementById('sf-'+k).className='sf'+(sfA[k]?' a'+k:''));
  ['all','r','o','g','n'].forEach(k=>document.getElementById('sc-'+k).classList.toggle('act',k===s));
  applyF();
}

// ══════════════════════════════════════
//  STATS
// ══════════════════════════════════════
function updateStats(){
  let r=0,o=0,g=0,n=0;
  F.forEach(x=>{const s=st(x.expiry);if(s==='r')r++;else if(s==='o')o++;else if(s==='g')g++;else n++;});
  document.getElementById('sn-all').textContent=F.length;
  document.getElementById('sn-r').textContent=r;
  document.getElementById('sn-o').textContent=o;
  document.getElementById('sn-g').textContent=g;
  document.getElementById('sn-n').textContent=n;
}

// ══════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════
function renderSB(){
  const q=(document.getElementById('sbsrch').value||'').toLowerCase();
  const cm={};
  ALL.forEach(r=>{if(q&&!r.client.toLowerCase().includes(q))return;if(!cm[r.client])cm[r.client]={t:0,w:'g'};cm[r.client].t++;const s=st(r.expiry);if(s==='r'||(s==='o'&&cm[r.client].w!=='r'))cm[r.client].w=s;});
  const sorted=Object.keys(cm).sort((a,b)=>{const ord={r:0,o:1,g:2,n:3};if(cm[a].w!==cm[b].w)return(ord[cm[a].w]||2)-(ord[cm[b].w]||2);return a.localeCompare(b,'he');});
  document.getElementById('clist').innerHTML=sorted.map(c=>{
    const i=cm[c],sel=selClients.has(c);
    return`<div class="ci${sel?' sel':''}${i.w==='r'?' sr':i.w==='o'?' so':''}" onclick="togClient('${E(c)}')">
      <div class="cicb">${sel?'✓':''}</div><div class="cin">${E(c)}</div><div class="cib">${i.t}</div>
    </div>`;
  }).join('');
  const sc=document.getElementById('selc');sc.textContent=selClients.size?`${selClients.size} נבחרו`:'';
}
function togClient(c){selClients.has(c)?selClients.delete(c):selClients.add(c);applyF()}
function selAll(){const q=(document.getElementById('sbsrch').value||'').toLowerCase();ALL.forEach(r=>{if(!q||r.client.toLowerCase().includes(q))selClients.add(r.client)});applyF()}
function clrClients(){selClients.clear();applyF()}
function selWorst(){selClients.clear();ALL.forEach(r=>{const s=st(r.expiry);if(s==='r'||s==='o')selClients.add(r.client)});applyF()}
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('off',!sbOpen)}

// ══════════════════════════════════════
//  SORT
// ══════════════════════════════════════
function srt(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true}
  document.querySelectorAll('thead th').forEach(th=>{th.classList.remove('sorted');th.querySelector('.sa').textContent='▲'});
  const th=document.getElementById('th-'+col);if(th){th.classList.add('sorted');th.querySelector('.sa').textContent=sortAsc?'▲':'▼'}
  sortF();renderTable_or_cards();
}
function sortF(){
  F.sort((a,b)=>{
    let va=a[sortCol]||'',vb=b[sortCol]||'';
    if(sortCol==='expiry'||sortCol==='docDate'){va=pd(va)||new Date(sortAsc?'2999-01-01':'1900-01-01');vb=pd(vb)||new Date(sortAsc?'2999-01-01':'1900-01-01');return sortAsc?va-vb:vb-va;}
    return sortAsc?va.localeCompare(vb,'he'):vb.localeCompare(va,'he');
  });
}

// ══════════════════════════════════════
//  RENDER
// ══════════════════════════════════════
function renderTable_or_cards(){if(vw==='t')renderTable();else renderCards()}

function openDoc(link){
  if(!link)return;
  if(link.startsWith('http')){
    // במובייל — נסה לפתוח ישירות בדפדפן עם target blank
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if(isMobile){
      // המר קישור OneDrive לקישור ישיר לפתיחה בדפדפן
      let url = link;
      // onedrive.live.com/personal/ → פתח ישירות
      // onedrive.live.com/?path= → שנה לפורמט embed
      if(url.includes('onedrive.live.com/?path=')){
        // שנה ל-embed URL שנפתח בדפדפן ולא באפליקציה
        url = url.replace('https://onedrive.live.com/?path=', 'https://onedrive.live.com/embed?path=');
      }
      window.open(url, '_blank');
    } else {
      window.open(link,'_blank');
    }
  } else {
    navigator.clipboard.writeText(link).then(()=>showToast('📋 נתיב הועתק')).catch(()=>{});
  }
}

function renderTable(){
  const tb=document.getElementById('tbody');
  if(!F.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty"><div class="ei">🔍</div><div class="et">לא נמצאו תוצאות</div></div></td></tr>`;return}
  tb.innerHTML=F.map(r=>{
    const s=st(r.expiry),l=sl(r.expiry);
    const pc=s==='r'?'pr':s==='o'?'po':s==='g'?'pg':'pn';
    const dot=s==='r'?'🔴':s==='o'?'🟡':s==='g'?'🟢':'⚪';
    const lk=r.link?`<button class="lbtn" onclick="openDoc('${E(r.link)}')">📄 פתח</button>`:`<span style="color:var(--t3)">—</span>`;
    return`<tr><td class="tdc">${E(r.client)}</td><td class="tdl" title="${E(r.location)}">${E(r.location||'—')}</td><td class="tdt">${E(r.docType)}</td><td class="tdd">${r.docDate||'—'}</td><td class="tdd">${r.expiry||'—'}</td><td><span class="pill ${pc}">${dot} ${l}</span></td><td>${lk}</td></tr>`;
  }).join('');
}

function renderCards(){
  const cv=document.getElementById('cv');
  if(!F.length){cv.innerHTML=`<div class="empty"><div class="ei">🔍</div><div class="et">לא נמצאו תוצאות</div></div>`;return}
  cv.innerHTML=F.map(r=>{
    const s=st(r.expiry),l=sl(r.expiry);
    const pc=s==='r'?'pr':s==='o'?'po':s==='g'?'pg':'pn';
    const cc=s==='r'?'cr':s==='o'?'co':s==='g'?'cg':'';
    const lk=r.link?`<button class="lbtn" onclick="openDoc('${E(r.link)}')">📄 פתח</button>`:'';
    return`<div class="card ${cc}"><div class="ct"><div class="ctype">${E(r.docType)}</div><span class="pill ${pc}">${l}</span></div>
    <div class="cmeta">👤 ${E(r.client)}${r.location?` · 📍 ${E(r.location)}`:''}
    </div><div class="cdates"><div><div class="cdl">תאריך מסמך</div><div class="cdv">${r.docDate||'—'}</div></div><div><div class="cdl">תאריך תוקף</div><div class="cdv">${r.expiry||'—'}</div></div></div>
    <div class="cfoot"><div class="cfn">${E(r.filename||'')}</div>${lk}</div></div>`;
  }).join('');
}

// ══════════════════════════════════════
//  VIEW / CLEAR / UTILS
// ══════════════════════════════════════
function setView(v){
  vw=v;
  document.getElementById('vbt').classList.toggle('on',v==='t');
  document.getElementById('vbc').classList.toggle('on',v==='c');
  document.getElementById('tarea').style.display=v==='t'?'flex':'none';
  document.getElementById('cv').style.display=v==='c'?'flex':'none';
  renderTable_or_cards();
}
function clrAll(){
  document.getElementById('fsearch').value='';
  ['loc','type','file'].forEach(id=>{mfSel[id].clear();document.getElementById('mfs-'+id).value='';document.getElementById('mf-'+id).classList.remove('open')});
  sfA={r:false,o:false,g:false,n:false};
  ['r','o','g','n'].forEach(k=>document.getElementById('sf-'+k).className='sf');
  ['all','r','o','g','n'].forEach(k=>document.getElementById('sc-'+k).classList.remove('act'));
  selClients.clear();
  applyF();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// חיפוש לפי מילים לא רצופות
function matchWords(q, fields){
  const words = q.trim().split(/\s+/).filter(Boolean);
  const combined = fields.filter(Boolean).join(' ').toLowerCase();
  return words.every(w => combined.includes(w));
}

// בחירה בdropdown דרך dataset (עוקפת בעיית quotes)
function mfToggleEl(el){
  const id = el.dataset.id;
  const v  = el.dataset.val;
  if(mfSel[id].has(v)) mfSel[id].delete(v);
  else mfSel[id].add(v);
  // לא סוגר את הדרופדאון — הוא יישאר פתוח עד לחיצה על "החל"
  renderMF(id);
  applyF();
  // מנע סגירה מאירוע mousedown שמתפשט
  event.stopPropagation();
}

function triggerScan(){
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.innerHTML = '⏳ סורק...';
  btn.style.opacity = '0.6';
  
  // הצג modal
  showScanModal('מתחיל סריקה...');
  
  // קרא ל-scanner.py דרך פרוטוקול niropen
  // מאחר שהדשבורד הוא HTML מקומי, נשתמש ב-fetch לקובץ סטטוס
  // הפתרון: פתח cmd עם scanner.py דרך niropen protocol
  try {
    window.location.href = 'niropen://scan';
  } catch(e) {}
  
  // רענן נתונים אחרי 90 שניות (זמן סריקה ממוצע)
  let remaining = 90;
  const interval = setInterval(()=>{
    remaining--;
    updateScanModal(`סורק... (${remaining}ש נותרו)`);
    if(remaining <= 0){
      clearInterval(interval);
      closeScanModal();
      btn.disabled = false;
      btn.innerHTML = '🔄 סרוק עכשיו';
      btn.style.opacity = '1';
      // רענן נתונים מהגיליון
      loadData().then(()=>{
        showToast('✅ סריקה הושלמה — נתונים עודכנו');
      });
    }
  }, 1000);
}

function showScanModal(msg){
  let m = document.getElementById('scan-modal');
  if(!m){
    m = document.createElement('div');
    m.id = 'scan-modal';
    m.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:28px 36px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:9999;text-align:center;min-width:280px;font-family:Heebo,sans-serif;direction:rtl';
    document.body.appendChild(m);
  }
  m.innerHTML = `<div style="font-size:2rem;margin-bottom:12px">🔄</div><div id="scan-modal-msg" style="font-size:1rem;color:#374151">${msg}</div><div style="margin-top:16px;font-size:.8rem;color:#9ca3af">הדשבורד יתרענן אוטומטית בסיום</div>`;
  m.style.display = 'block';
}

function updateScanModal(msg){
  const el = document.getElementById('scan-modal-msg');
  if(el) el.textContent = msg;
}

function closeScanModal(){
  const m = document.getElementById('scan-modal');
  if(m) m.style.display = 'none';
}

function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:.85rem;z-index:9999;font-family:Heebo,sans-serif;opacity:0;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity = '0'; }, 4000);
}

// ══ ARCHIVE ══
function isArchived(expiry){
  const d=pd(expiry); if(!d)return false;
  const days=Math.floor((d-new Date().setHours(0,0,0,0))/86400000);
  return days < -730; // מעל שנתיים
}

function toggleArchive(){
  const p=document.getElementById('arc-panel');
  const open=p.style.display==='block';
  p.style.display=open?'none':'block';
  if(!open){document.getElementById('arc-search').value='';renderArchive();}
}

function renderArchive(){
  const q=(document.getElementById('arc-search').value||'').toLowerCase();
  const data=ALL.filter(r=>isArchived(r.expiry)).filter(r=>{
    if(!q)return true;
    return[r.client,r.location,r.docType,r.filename].some(f=>f.toLowerCase().includes(q));
  });
  data.sort((a,b)=>{
    const da=pd(a.expiry)||new Date('1900-01-01');
    const db=pd(b.expiry)||new Date('1900-01-01');
    return db-da; // הפחות ישן קודם
  });
  document.getElementById('arc-sub').textContent=
    data.length+' מסמכים (מסוננים: '+(q?data.length:ALL.filter(r=>isArchived(r.expiry)).length)+')';
  const tb=document.getElementById('arc-tbody');
  if(!data.length){
    tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--t3);font-size:.85rem">אין מסמכים התואמים את החיפוש</td></tr>';
    return;
  }
  tb.innerHTML=data.map(r=>{
    const d=pd(r.expiry);
    const daysAgo=d?Math.floor((new Date().setHours(0,0,0,0)-d)/86400000):0;
    const yearsAgo=(daysAgo/365).toFixed(1);
    const lk=r.link
      ?'<button class="lbtn" onclick="openDoc(\''+E(r.link)+'\')">📄 פתח</button>'
      :'<span style="color:var(--t3)">—</span>';
    return '<tr style="opacity:.8">'+
      '<td style="padding:8px 12px;font-weight:600;font-size:.79rem;border-bottom:1px solid var(--br)">'+E(r.client)+'</td>'+
      '<td style="padding:8px 12px;color:var(--t2);font-size:.75rem;border-bottom:1px solid var(--br);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+E(r.location)+'">'+E(r.location||'—')+'</td>'+
      '<td style="padding:8px 12px;font-size:.78rem;border-bottom:1px solid var(--br)">'+E(r.docType)+'</td>'+
      '<td style="padding:8px 12px;color:var(--t2);font-size:.75rem;white-space:nowrap;border-bottom:1px solid var(--br)">'+( r.expiry||'—')+'</td>'+
      '<td style="padding:8px 12px;border-bottom:1px solid var(--br)"><span style="background:#f1f5f9;color:var(--t3);border:1px solid var(--br);border-radius:20px;padding:2px 8px;font-size:.68rem;font-weight:600">'+yearsAgo+' שנים</span></td>'+
      '<td style="padding:8px 12px;border-bottom:1px solid var(--br)">'+lk+'</td>'+
      '</tr>';
  }).join('');
}

function updateArchiveCount(){
  const n=ALL.filter(r=>isArchived(r.expiry)).length;
  document.getElementById('arc-count').textContent=n||'';
}

</script>

<!-- ARCHIVE PANEL -->
<div id="arc-panel" style="display:none;position:fixed;inset:0;z-index:250;background:rgba(15,23,42,.55);backdrop-filter:blur(6px)" onclick="if(event.target===this)toggleArchive()">
  <div style="position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;max-height:78vh;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.15)">
    <div style="padding:14px 18px 10px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap">
      <div style="font-size:1rem">📦</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.9rem;font-weight:800">ארכיון — מסמכים שפג תוקפם מעל שנתיים</div>
        <div style="font-size:.7rem;color:var(--t3)" id="arc-sub"></div>
      </div>
      <input id="arc-search" placeholder="🔍 חפש בארכיון..." style="padding:7px 10px;background:var(--s2);border:1.5px solid var(--br);border-radius:8px;font-size:.8rem;font-family:Heebo,sans-serif;direction:rtl;width:200px;transition:border-color .2s" oninput="renderArchive()">
      <button onclick="toggleArchive()" style="background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.8rem;color:var(--t2);font-family:Heebo,sans-serif">✕ סגור</button>
    </div>
    <div style="overflow:auto;flex:1" id="arc-body">
      <table style="width:100%;border-collapse:collapse;font-size:.79rem;min-width:580px">
        <thead id="arc-thead">
          <tr>
            <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);white-space:nowrap;background:#fff;position:sticky;top:0">שם לקוח</th>
            <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);white-space:nowrap;background:#fff;position:sticky;top:0">מיקום</th>
            <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);white-space:nowrap;background:#fff;position:sticky;top:0">סוג מסמך</th>
            <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);white-space:nowrap;background:#fff;position:sticky;top:0">תאריך תוקף</th>
            <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);white-space:nowrap;background:#fff;position:sticky;top:0">פג לפני</th>
            <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--br);background:#fff;position:sticky;top:0">פתיחה</th>
          </tr>
        </thead>
        <tbody id="arc-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
